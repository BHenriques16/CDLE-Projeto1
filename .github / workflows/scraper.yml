name: Hourly Tech News Scraper

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: 

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the Scraper (main.py)
        run: |
          python src/main.py

      - name: Commit and Push the updated JSON
        run: |
          # Setup a bot identity for the commit
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data/articles.json logs/extraction.log

          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Extracted new tech articles" && git push)
